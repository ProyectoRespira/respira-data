services:
  project_postgres:
    image: postgres:16
    container_name: project_postgres
    environment:
      POSTGRES_DB: ${PROJECT_DB_NAME}
      POSTGRES_USER: ${PROJECT_DB_USER}
      POSTGRES_PASSWORD: ${PROJECT_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - project_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PROJECT_DB_USER} -d ${PROJECT_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  prefect_server:
    image: prefecthq/prefect:3.6.9-python3.12
    container_name: prefect_server
    environment:
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    ports:
      - "4200:4200"

  app:
    build: .
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      project_postgres:
        condition: service_healthy
      prefect_server:
        condition: service_started
    command: ["bash", "-lc", "bash"]

volumes:
  project_postgres_data:
