services:

  prefect_server:
    image: prefecthq/prefect:3.6.20-python3.12
    container_name: prefect_server
    environment:
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_UI_API_URL: http://127.0.0.1:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_API_PORT: 4200
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5)\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - DBT_PROFILES_DIR=/app/dbt
    volumes:
      - ./:/app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      prefect_server:
        condition: service_started
    command: ["bash", "-lc", "sleep infinity"]

  prefect_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    working_dir: /app
    environment:
      - DBT_PROFILES_DIR=/app/dbt
      - PREFECT_API_URL=http://prefect_server:4200/api
      - PREFECT_WORK_POOL=default
      - PREFECT_WORKER_TYPE=process
      - PREFECT_SCHEDULE_TIMEZONE=UTC
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      prefect_server:
        condition: service_healthy
    command: ["bash", "-lc", "./scripts/prefect_worker_start.sh"]
    restart: unless-stopped
