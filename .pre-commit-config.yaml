minimum_pre_commit_version: "3.7.0"

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version — keep in sync with pyproject.toml and CI workflows.
    rev: v0.15.12
    hooks:
      # Run the linter with auto-fix first, then the formatter.
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: smoke-test
        name: smoke-test
        entry: bash -lc 'POETRY_VIRTUALENVS_CREATE=false poetry run pytest -q tests/test_artifacts.py tests/test_dbt_tasks_command.py tests/test_gates.py tests/test_inference_json.py tests/test_projects_config.py tests/test_inference_flow.py'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
