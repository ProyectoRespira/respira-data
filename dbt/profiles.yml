respira_data:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PROJECT_DB_HOST') }}"
      port: "{{ env_var('PROJECT_DB_PORT') | int }}"
      user: "{{ env_var('PROJECT_DB_USER') }}"
      password: "{{ env_var('PROJECT_DB_PASSWORD') }}"
      dbname: "{{ env_var('PROJECT_DB_NAME') }}"
      schema: "{{ env_var('DBT_TARGET_SCHEMA', 'public') }}"
      threads: 4
