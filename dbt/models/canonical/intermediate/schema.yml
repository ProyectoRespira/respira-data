version: 2

models:
  - name: int_measurements_long
    description: >
      Canonical long-form measurements union across sources defined in vars.measurements_sources.
      Contains station_code, data_source_name, measured_at_parsed, cursor_id (nullable), validity flag, variable_code and raw/parsed values.
    columns:
      - name: station_code
        tests: [not_null]
      - name: data_source_name
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_data_sources')
                field: name
      - name: measured_at_parsed
        description: "Raw parsed timestamp (UTC) from source."
      - name: cursor_id
        description: "Continuity cursor. Present for FIUNA; null for AireLibre and Meteostat."
      - name: is_measured_at_valid
      - name: variable_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_variables')
                field: code
      - name: value_raw
        tests: [not_null]
      - name: value_parsed
      - name: raw_payload
        tests: [not_null]

    tests:
      - dbt_utils.expression_is_true:
          expression: "variable_code in (select code from {{ ref('variables') }})"

