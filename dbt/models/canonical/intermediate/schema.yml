  - name: int_measurements_values_silver
    description: >
      Silver value validation/cleaning output. Joins time silver + long values; applies variable-specific validation to produce value_silver.
      The fact model should only consume rows where measured_at_silver is not null and value_silver is not null.
    columns:
      - name: data_source_name
        tests: [not_null]
      - name: station_code
        tests: [not_null]
      - name: variable_code
        tests: [not_null]
      - name: cursor_id
      - name: measured_at_silver
      - name: value_raw
        tests: [not_null]
      - name: value_parsed
      - name: value_silver
        description: "Validated/cleaned final numeric value. Null when invalid."
      - name: raw_payload
        tests: [not_null]

    tests:
      - dbt_utils.expression_is_true:
          expression: "variable_code in (select code from {{ ref('variables') }})"

  - name: int_stations_candidates
    description: "Union of stations from static seed plus AireLibre latest geolocated stations."
    columns:
      - name: code
        tests: [not_null]
      - name: name
        tests: [not_null]
      - name: latitude
      - name: longitude
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ["active", "inactive"]
      - name: properties
        tests: [not_null]

  - name: int_streams_candidates
    description: "Distinct station_code x variable_code x data_source_name combinations derived from int_measurements_long."
    columns:
      - name: station_code
        tests: [not_null]
      - name: variable_code
        tests: [not_null]
      - name: data_source_name
        tests: [not_null]
      - name: code
        tests: [not_null]
      - name: name
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["code"]
