version: 2

seeds:
  - name: data_sources
    description: "Seed defining known data sources."
    columns:
      - name: name
        tests: [not_null, unique]
      - name: organization_code
        tests: [not_null]
      - name: type
        tests: [not_null]
      - name: active
        tests: [not_null]

  - name: variables
    description: "Seed defining supported measurement variables."
    columns:
      - name: code
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: data_type
        tests: [not_null]
      - name: category
        tests: [not_null]

  - name: stations_static
    description: "Static station registry."
    columns:
      - name: code
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: status
        tests: [not_null]
      - name: is_pattern_station
        tests: [not_null]

  - name: projects
    description: "Projects registry."
    columns:
      - name: id
        tests: [not_null, unique]
      - name: code
        tests: [not_null, unique]
      - name: owner_organization_code
        tests: [not_null]

  - name: organizations
    description: "Organizations registry."
    columns:
      - name: short_name
        tests: [not_null, unique]
      - name: name
        tests: [not_null]

  - name: project_data_sources
    description: "Mapping between projects and data sources."
    columns:
      - name: project_code
        tests: [not_null]
      - name: data_source_name
        tests: [not_null]

  - name: project_organizations
    description: "Mapping between projects and organizations involved."
    columns:
      - name: project_code
        tests: [not_null]
      - name: organization_code
        tests: [not_null]

  - name: regions_seed
    description: "Optional seed to define regions explicitly (overrides generated regions when populated)."
    columns:
      - name: region_code
        tests: [not_null, unique]
      - name: name
        tests: [not_null]
      - name: bbox
        tests: [not_null]

  - name: station_region_seed
    description: "Optional seed mapping stations to regions. When empty, stations map to their own region_code."
    columns:
      - name: station_code
        tests: [not_null, unique]
      - name: region_code
        tests: [not_null]

  - name: calibration_factors_seed
    description: "Optional seed for PM calibration factors (used when external calibration_factors table is missing)."
    columns:
      - name: station_code
        tests: [not_null]
      - name: date_start_use
        tests: [not_null]
      - name: date_end_use
      - name: calibration_factor
        tests: [not_null]
