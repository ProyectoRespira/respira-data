name: Python Build

on:
  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize]
    paths:
      - 'pipelines/**'
      - 'src/**'
      - 'tests/**'
      - 'inference/**'
      - 'pyproject.toml'

permissions:
  contents: read

concurrency:
  group: python-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Python Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: '3.12'

      - name: Build Python bytecode
        run: python -m compileall -q pipelines src
